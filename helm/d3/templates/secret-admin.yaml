{{- if and .Values.admin.autoGenerate (not .Values.admin.existingSecret) }}
{{- $fullname := include "d3.fullname" . }}
{{- $secretName := printf "%s-admin" $fullname }}
{{- $key := .Values.admin.existingSecretKey }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "d3.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $key }}: |
{{- if and $existing (index $existing.data $key) }}
{{ index $existing.data $key | b64dec | nindent 4 }}
{{- else }}
    admin_user:
      access_key_id: {{ printf "AKIA%s" (randAlphaNum 16 | upper) }}
      secret_access_key: {{ randAlphaNum 40 }}
{{- end }}
{{- end }}
