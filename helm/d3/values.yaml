# Default values for d3.
# Build and push an image from the repo Dockerfile, then set image.repository / image.tag.

environment: production

replicaCount: 1

image:
  repository: d3
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 65534

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Scratch image + writable /data: use emptyDir for writeable mounts if needed.
# readOnlyRootFilesystem false is often simpler for scratch binaries that expect writable /tmp;
# d3 writes only under mounted /data and /etc/d3; /tmp may still be needed — use emptyDir for tmp
# when readOnlyRootFilesystem is true.
extraTmpVolume: true

service:
  type: ClusterIP
  apiPort: 8080
  healthPort: 8081
  managementPort: 8082
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: d3.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  annotations: {}

# Admin credentials for production: set existingSecret OR enable autoGenerate.
# Format: data key `existingSecretKey` holds YAML with admin_user (access_key_id 20 chars, secret_access_key 40 chars).
# For ephemeral dev credentials: environment=development (or test), existingSecret="", autoGenerate=false.
admin:
  existingSecret: ""
  existingSecretKey: admin-credentials.yaml
  mountPath: /etc/d3/admin-credentials.yaml
  autoGenerate: true

extraEnv: []

redis:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "8.0"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  persistence:
    enabled: true
    storageClass: ""
    size: 1Gi
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi

# Required when redis.enabled is false (e.g. managed Valkey/Redis).
externalRedis:
  address: ""
  username: ""
  password: ""
  existingSecret: ""
  existingSecretPasswordKey: redis-password
