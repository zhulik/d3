suite: ingress
templates:
  - ingress.yaml
tests:
  - it: does not render when ingress is disabled
    asserts:
      - hasDocuments:
          count: 0
  - it: renders Ingress when enabled
    set:
      ingress.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress
          documentIndex: 0
