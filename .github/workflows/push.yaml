name: Test, lint, build and Push to GHCR

on:
    push:
      branches: [ "**" ]
      tags:
        - 'v*'
  
    pull_request:
      branches: [ "**" ]
   
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache asdf
        uses: actions/cache@v5
        with:
          path: ~/.asdf
          key: |
            asdf-${{ runner.os }}-${{ hashFiles('.tool-versions', 'go.sum') }}
          restore-keys: |
            asdf-${{ runner.os }}-

      - name: Cache linter
        uses: actions/cache@v5
        with:
          path: ~/.cache/golangci-lint
          key: |
            golangci-lint-${{ runner.os }}-${{ hashFiles('.tool-versions', 'go.sum') }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-

      - uses: asdf-vm/actions/install@v4

      - name: Run linter
        run: task lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache asdf
        uses: actions/cache@v5
        with:
          path: ~/.asdf
          key: |
            asdf-${{ runner.os }}-${{ hashFiles('.tool-versions', 'go.sum') }}
          restore-keys: |
            asdf-${{ runner.os }}-

      - name: Cache go-build
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: |
            go-build-${{ runner.os }}-${{ hashFiles('.tool-versions', 'go.sum') }}
          restore-keys: |
            go-build-${{ runner.os }}-

      - uses: asdf-vm/actions/install@v4

      - name: Run valkey
        run: docker compose up -d valkey

      - name: Run tests
        run: task test test:integration

  helm-chart:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache asdf
        uses: actions/cache@v5
        with:
          path: ~/.asdf
          key: |
            asdf-${{ runner.os }}-${{ hashFiles('.tool-versions', 'go.sum', 'helm/ct-tools/uv.lock', 'helm/ct-tools/pyproject.toml') }}
          restore-keys: |
            asdf-${{ runner.os }}-

      - uses: asdf-vm/actions/install@v4

      - name: Helm chart checks
        run: task helm:ci

  deploy:
    # pull_request uses refs like refs/pull/2/merge → ref_name "2/merge", which is not a valid image tag.
    # Publish only on push (branches and tags), not on PR CI.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - helm-chart

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache asdf
        uses: actions/cache@v5
        with:
          path: ~/.asdf
          key: |
            asdf-${{ runner.os }}-${{ hashFiles('.tool-versions', 'go.sum') }}
          restore-keys: |
            asdf-${{ runner.os }}-

      - name: Cache go-build
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: |
            go-build-${{ runner.os }}-${{ hashFiles('.tool-versions', 'go.sum') }}
          restore-keys: |
            go-build-${{ runner.os }}-

      - uses: asdf-vm/actions/install@v4

      - name: Set image tags
        id: tags
        run: |
          if [ "${{ github.ref_type }}" = "branch" ] && [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            ref="${{ github.ref_name }}"
            # OCI tags: [a-zA-Z0-9._-] only (no / e.g. feature/my-branch)
            tag=$(printf '%s' "$ref" | sed 's/[^a-zA-Z0-9._-]/-/g')
            echo "tag=$tag" >> $GITHUB_OUTPUT
          fi

      - name: Build and push image with ko
        env:
          KO_DOCKER_REPO: ghcr.io/zhulik
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ko build -B --tags ${{ steps.tags.outputs.tag }} github.com/zhulik/d3/cmd/d3-server
