name: Feature request
description: Suggest an improvement or new capability for d3.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this form for **features and enhancements**. For broken behavior, use **Bug report**.
  - type: textarea
    id: summary
    validations:
      required: true
    attributes:
      label: Summary
      description: What would you like to see added or changed, and why?
      placeholder: One or two paragraphs is enough to start.
  - type: textarea
    id: motivation
    validations:
      required: true
    attributes:
      label: Problem / motivation
      description: What limitation or pain point does this address?
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How could this work? APIs, config flags, UX—be as specific as you like.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, or write "None".
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Diagrams, prior art, compatibility notes, etc.
